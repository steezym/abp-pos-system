<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="POS System - Dashboard utama untuk monitoring aktivitas toko">
    <title>Dashboard - POS System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-page">
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-brand">Nama Produk + logo</span>
                <button class="sidebar-close d-lg-none" id="sidebarClose">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item active" data-page="dashboard">
                        <a href="index.html">
                            <i class="bi bi-grid"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item" data-page="products">
                        <a href="#" onclick="showComingSoon(event)">
                            <i class="bi bi-box-seam"></i>
                            <span>Products</span>
                        </a>
                    </li>
                    <li class="nav-item" data-page="transactions">
                        <a href="#" onclick="showComingSoon(event)">
                            <i class="bi bi-receipt"></i>
                            <span>Transactions</span>
                        </a>
                    </li>
                    <li class="nav-item" data-page="users">
                        <a href="users.html">
                            <i class="bi bi-people"></i>
                            <span>User Management</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <button class="btn-logout" id="btnLogout">
                    <i class="bi bi-box-arrow-left"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar">
                <div class="navbar-left">
                    <button class="sidebar-toggle d-lg-none" id="sidebarOpen">
                        <i class="bi bi-list"></i>
                    </button>
                    <h1 class="page-title">Dashboard</h1>
                </div>
                <div class="navbar-right">
                    <button class="btn-icon" id="btnNotification">
                        <i class="bi bi-bell"></i>
                    </button>
                    <div class="user-menu dropdown">
                        <button class="btn-icon" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-person-circle"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><span class="dropdown-item-text fw-semibold" id="userName">Budi Santoso</span></li>
                            <li><span class="dropdown-item-text text-muted small" id="userRole">Admin</span></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="btnLogoutMenu"><i class="bi bi-box-arrow-left me-2"></i>Logout</a></li>
                        </ul>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content">
                <div class="coming-soon-section">
                    <div class="coming-soon-card">
                        <i class="bi bi-speedometer2 coming-soon-icon"></i>
                        <h3>Dashboard</h3>
                        <p>Halaman dashboard sedang dalam pengembangan. Gunakan menu <strong>User Management</strong> untuk mengelola pengguna.</p>
                        <a href="users.html" class="btn btn-dark btn-sm rounded-pill px-4">
                            <i class="bi bi-people me-2"></i>Kelola Pengguna
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Coming Soon Toast -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
        <div class="toast align-items-center text-bg-dark border-0" id="comingSoonToast" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-info-circle me-2"></i>Fitur ini sedang dalam pengembangan
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
