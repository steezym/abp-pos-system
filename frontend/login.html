<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="POS System - Login untuk mengakses sistem manajemen penjualan">
    <title>Login - POS System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <!-- Header -->
            <div class="login-header">
                <p class="login-logo">Logo</p>
                <h1 class="login-title">Monitor System</h1>
                <p class="login-subtitle">Authorized Access Only</p>
            </div>

            <!-- Alert -->
            <div id="loginAlert" class="alert alert-danger d-none" role="alert">
                <span id="loginAlertMessage"></span>
            </div>

            <!-- Form Card -->
            <div class="login-card">
                <form id="loginForm" novalidate>
                    <div class="mb-3">
                        <label for="email" class="form-label">Username</label>
                        <input type="email" class="form-control" id="email" placeholder="" required autocomplete="email">
                        <div class="invalid-feedback">Masukkan email yang valid</div>
                    </div>

                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <label for="password" class="form-label mb-0">Password</label>
                            <a href="#" class="reset-link">Reset access?</a>
                        </div>
                        <input type="password" class="form-control" id="password" placeholder="" required autocomplete="current-password">
                        <div class="invalid-feedback">Password wajib diisi</div>
                    </div>

                    <button type="submit" class="btn btn-login" id="btnLogin">
                        <span class="btn-text">Login</span>
                        <span class="btn-loader d-none">
                            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                            Memproses...
                        </span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
